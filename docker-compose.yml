version: '3.9'

services:
  db:
    image: postgres:14
    container_name: health_db
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_user -d health"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_api
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Commented out command to let Dockerfile's CMD ["./entrypoint.sh"] run migrations.
    # entrypoint.sh ends with uvicorn start.

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: health_web
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - ./web/vite.config.ts:/app/vite.config.ts
      - ./web/tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host

  nginx:
    image: nginx:1.27-alpine
    container_name: health_nginx
    depends_on:
      - api
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
