version: '3.9'

services:
  db:
    image: postgres:14
    container_name: health_db
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_user -d health"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_api
    environment:
      DATABASE_URL: postgresql+psycopg://health_user:health_pass@db:5432/health
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_now}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_MINUTES: "10080"
      CORS_ORIGINS: "http://localhost:8080,http://localhost:3000"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me_please}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-System Admin}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: health_web

  nginx:
    image: nginx:1.27-alpine
    container_name: health_nginx
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
