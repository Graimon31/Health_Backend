version: '3.9'

services:
  db:
    image: postgres:14
    container_name: health_db
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_api
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: health_web

  nginx:
    image: nginx:1.27-alpine
    container_name: health_nginx
    depends_on:
      - api
      - web
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
